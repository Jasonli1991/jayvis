<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JAYVIS 專用瀏覽器</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #faf7f2; color: #2b2b2b;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1f1d1a; color: #ececec; }
      .card { background: #2a2723 !important; box-shadow: none !important; }
      .hint { color: #b9b2a8 !important; }
    }
    .card {
      max-width: 560px; margin: 24px; padding: 40px 44px;
      background: #fff; border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,.08); text-align: center;
    }
    .emoji { font-size: 56px; line-height: 1; }
    h1 { font-size: 22px; margin: 18px 0 8px; }
    p { font-size: 15px; line-height: 1.7; margin: 10px 0; }
    .warn { font-weight: 700; color: #c0392b; }
    @media (prefers-color-scheme: dark) { .warn { color: #ff8a7a; } }
    .hint { font-size: 13px; color: #8a8378; margin-top: 22px; }
    code { background: rgba(127,127,127,.15); padding: 2px 7px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🤖🌐</div>
    <h1>這是 JAYVIS 的專用瀏覽器</h1>
    <p class="warn">請保持這個視窗開啟，不要關掉它。</p>
    <p>助理需要靠它來幫你查網頁、操作網站。<br>關掉的話，助理就無法上網，會回你「瀏覽器還沒就緒」。</p>
    <p>第一次使用前，請在這個視窗登入你要讓助理操作的網站（帳號與個人 Chrome 完全隔離）。</p>
    <p class="hint">真的不想要它常駐？到 JAYVIS 控制台把「<code>網站瀏覽</code>」開關關掉即可。</p>
  </div>
</body>
</html>
